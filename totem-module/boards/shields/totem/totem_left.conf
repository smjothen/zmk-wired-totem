CONFIG_ZMK_USB=y

# USB CDC ACM logging (manual config since ZMK_USB_LOGGING is broken with Zephyr 4.1)
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=100
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=1000
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=1024
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_CDC_ACM_LOG_LEVEL_OFF=y
CONFIG_USB_DRIVER_LOG_LEVEL_OFF=y

# RGB LED (PWM) -- layers + keypress blink
CONFIG_ZMK_XIAO_RP2040_LED=y
CONFIG_ZMK_XIAO_RP2040_LED_MODIFIER_INDICATION=n

# NeoPixel (WS2812) -- modifiers + layers
CONFIG_ZMK_XIAO_RP2040_NEOPIXEL=y
CONFIG_ZMK_XIAO_RP2040_NEOPIXEL_KEYPRESS_BLINK=n
