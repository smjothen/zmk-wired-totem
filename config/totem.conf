CONFIG_ZMK_USB_LOGGING=n

# Use polling mode for wired split UART (PIO UART on right half doesn't support interrupts)
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_POLLING=y
CONFIG_ZMK_SPLIT_WIRED_POLLING_RX_PERIOD=1

# Mouse/pointing support (for urob's mouse layer)
CONFIG_ZMK_POINTING=y

# ZMK Studio support
CONFIG_ZMK_STUDIO=y
