name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/boards/shields/totem/*.keymap"
      - "config/boards/shields/totem/*.dtsi"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/boards/shields/totem/*.keymap"
      config_path: "keymap_drawer.config.yaml"
      output_folder: "draw"
